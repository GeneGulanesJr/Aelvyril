name: Benchmark

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Benchmark suite to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - phase1
          - phase2
          - phase3
          - pii-bench
          - tab
          - datafog
          - adversarial
          - dashboard
      num_samples:
        description: "Number of samples (default: 500 for CI)"
        required: false
        default: "500"
      seed:
        description: "Random seed (default: 42)"
        required: false
        default: "42"

  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: "0 0 * * 0"

  pull_request:
    paths:
      - "src-tauri/src/pii/**"
      - "src-tauri/presidio_service.py"
      - "benchmarks/**"
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests numpy

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      # Build the mock service (no Python dependencies needed)
      - name: Start mock PII service
        run: |
          python benchmarks/mock_service.py &
          sleep 2
          # Verify service is healthy
          curl -sf http://localhost:5000/health | python -m json.tool

      - name: Run benchmarks
        run: |
          python -m benchmarks.run \
            --suite ${{ github.event.inputs.suite || 'all' }} \
            --num-samples ${{ github.event.inputs.num_samples || '500' }} \
            --seed ${{ github.event.inputs.seed || '42' }} \
            --service-url http://localhost:5000/analyze \
            --clear-cache
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      - name: Generate dashboard
        run: python -m benchmarks.dashboard.generate_charts

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            benchmarks/results/
            BENCHMARK_COMPARISON.md
            benchmarks/CROSS_BENCHMARK_MATRIX.md
          retention-days: 90

      # Post results as PR comment (only on PRs)
      - name: Post benchmark summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body = '## 📊 Benchmark Results\n\n';

            // Try to load comparison table
            const comparisonPath = 'BENCHMARK_COMPARISON.md';
            if (fs.existsSync(comparisonPath)) {
              const comparison = fs.readFileSync(comparisonPath, 'utf8');
              // Extract just the summary and comparison table sections
              const lines = comparison.split('\n');
              let inTable = false;
              let tableLines = [];
              for (const line of lines) {
                if (line.startsWith('## Target Benchmark Table') || line.startsWith('## PII-Bench')) {
                  inTable = true;
                }
                if (inTable) {
                  tableLines.push(line);
                  if (line === '' && tableLines.length > 5) break;
                }
              }
              if (tableLines.length > 0) {
                body += tableLines.join('\n') + '\n\n';
              }
            }

            body += '<details><summary>Full methodology</summary>\n\n';
            body += 'Run with `python -m benchmarks.run --suite all --clear-cache`\n';
            body += 'Generated by mock service (not live Aelvyril).\n\n';
            body += '</details>\n';

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
