version: '3.9'
services:
  presidio:
    build:
      context: ..
      dockerfile: benchmarks/presidio_service.Dockerfile
    container_name: aelvyril-presidio
    ports:
    - 5000:3000
    environment:
    - AELVYRIL_PRESIDIO_HOST=0.0.0.0
    - PRESIDIO_HOST=0.0.0.0
    - AELVYRIL_MODE=enhanced
    volumes:
    - ./data:/app/data:ro
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3000/health
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
    - bench-net
  mock:
    build:
      context: ..
      dockerfile: benchmarks/mock_service.Dockerfile
    container_name: aelvyril-mock
    ports:
    - 3000:3000
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3000/health
      interval: 3s
      timeout: 2s
      retries: 3
      start_period: 3s
    networks:
    - bench-net
    profiles:
    - ci
  presidio-vanilla:
    build:
      context: ..
      dockerfile: benchmarks/presidio_service.Dockerfile
    container_name: aelvyril-presidio-vanilla
    ports:
    - 5001:3000
    environment:
    - AELVYRIL_PRESIDIO_HOST=0.0.0.0
    - PRESIDIO_HOST=0.0.0.0
    - AELVYRIL_MODE=vanilla
    volumes:
    - ./data:/app/data:ro
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3000/health
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
    - bench-net
networks:
  bench-net:
    driver: bridge
