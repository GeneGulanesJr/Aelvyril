<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a3d;
    }
    .logo {
      font-size: 18px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      color: #7c6aef;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #12121a;
      border: 1px solid #1e1e30;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.connected {
      background: #34d399;
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
    }
    .dot.disconnected {
      background: #606078;
    }
    .status-text {
      font-size: 13px;
      color: #9898b0;
    }
    .info {
      font-size: 12px;
      color: #606078;
      line-height: 1.5;
    }
    .info strong {
      color: #9898b0;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🛡️</span>
    <span class="title">Aelvyril</span>
  </div>

  <div class="status">
    <div class="dot disconnected" id="status-dot"></div>
    <span class="status-text" id="status-text">Checking connection…</span>
  </div>

  <p class="info">
    <strong>Gateway:</strong> ws://localhost:4242/ws<br>
    <strong>Status:</strong> <span id="gateway-status">—</span>
  </p>

  <script src="popup.js"></script>
</body>
</html>
